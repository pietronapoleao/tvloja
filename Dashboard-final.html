<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TVLoja · Dashboard Profissional</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ----------------------------------
       VARIÁVEIS DE TEMA
       ---------------------------------- */
    :root {
      --bg-gradient: linear-gradient(135deg, #f5f7fc 0%, #eef2f6 100%);
      --sidebar-bg: rgba(255,255,255,0.85);
      --card-bg: rgba(255,255,255,0.98);
      --text-primary: #0b1c33;
      --text-secondary: #2c3e66;
      --text-muted: #5e7194;
      --border: rgba(0,0,0,0.08);
      --primary: #f97316;
      --primary-hover: #ea580c;
      --primary-light: rgba(249,115,22,0.12);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --shadow-sm: 0 8px 20px rgba(0,0,0,0.03);
      --shadow-md: 0 12px 28px rgba(0,0,0,0.08);
      --glass-border: 1px solid rgba(255,255,255,0.5);
      --radius: 1.5rem;
      --sidebar-width: 280px;
    }

    body.dark {
      --bg-gradient: linear-gradient(135deg, #0a0f1c 0%, #0f172a 100%);
      --sidebar-bg: rgba(15,23,42,0.9);
      --card-bg: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --shadow-sm: 0 8px 20px rgba(0,0,0,0.2);
      --shadow-md: 0 12px 28px rgba(0,0,0,0.3);
      --glass-border: 1px solid rgba(255,255,255,0.1);
      --primary-light: rgba(249,115,22,0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    /* Trava o scroll no body para usar o overflow no main-content */
    body {
      background: var(--bg-gradient);
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
      overflow: hidden; 
      height: 100vh;
      width: 100vw;
    }

    /* ----------------------------------
       LAYOUT E SIDEBAR
       ---------------------------------- */
    .app {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      backdrop-filter: blur(12px);
      border-right: var(--glass-border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      z-index: 1000;
      box-shadow: var(--shadow-sm);
    }

    .sidebar-header {
      padding: 2rem 1.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-weight: 800;
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--primary), #facc15);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo span { background: none; color: var(--text-primary); }
    
    .user-info {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .avatar-lg {
      width: 48px;
      height: 48px;
      background: var(--primary-light);
      border-radius: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--primary);
      flex-shrink: 0;
    }

    .user-text .name { font-weight: 700; font-size: 0.9rem; }
    .user-text .email { font-size: 0.75rem; color: var(--text-muted); word-break: break-all; }

    .sidebar-nav {
      flex: 1;
      padding: 1.8rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      overflow-y: auto;
    }

    .sidebar-nav::-webkit-scrollbar { width: 4px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .nav-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin: 10px 0 5px 15px;
      font-weight: 700;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.8rem 1rem;
      border-radius: 1rem;
      color: var(--text-secondary);
      transition: all 0.2s;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .nav-item i { width: 1.6rem; font-size: 1.1rem; text-align: center; }
    
    .nav-item:hover { 
      background: var(--primary-light); 
      color: var(--primary); 
      transform: translateX(5px); 
    }

    .nav-item.active {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 700;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    /* Overlay Mobile Ajustado */
    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 998; /* Fica logo abaixo da sidebar (1000) */
      backdrop-filter: blur(3px);
    }

    .sidebar-overlay.show {
      display: block;
    }

    /* ----------------------------------
       MAIN CONTENT E TOPBAR (Com rolagem)
       ---------------------------------- */
    .main-content {
      margin-left: var(--sidebar-width);
      width: calc(100% - var(--sidebar-width));
      height: 100vh;
      overflow-y: auto; /* Rolagem interna */
      overflow-x: hidden;
      padding: 2rem 2.5rem 3rem;
      transition: all 0.3s ease;
    }

    /* Container de limitação para monitores ultrawide */
    .content-wrapper {
      max-width: 1400px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .page-title { display: flex; align-items: center; gap: 15px; }
    .page-title h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 0.2rem;
    }
    .page-title p { color: var(--text-muted); font-size: 0.85rem; }

    .menu-mobile {
      display: none;
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--text-primary);
      cursor: pointer;
    }

    /* Tema Toggle do Dashboard 1 */
    .theme-toggle {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 2.5rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-primary);
      font-weight: 600;
      transition: all 0.2s;
    }
    .theme-toggle:hover {
      box-shadow: var(--shadow-sm);
    }

    /* ----------------------------------
       CARDS E GRIDS
       ---------------------------------- */
    .card-modern {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 1.5rem;
      border: var(--glass-border);
      box-shadow: var(--shadow-sm);
      transition: all 0.25s;
    }
    .card-modern:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .stat-icon {
      width: 48px; height: 48px;
      border-radius: 1rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }

    .stat-label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 0.3rem;}
    .stat-value { font-size: 1.6rem; font-weight: 800; display: block; margin-bottom: 0.5rem;}
    .stat-trend { font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    
    .status-pill {
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .status-active { background: #dcfce7; color: #166534; }
    .status-pending { background: #fef9c3; color: #854d0e; }
    .status-expired { background: #fee2e2; color: #991b1b; }

    /* Main Grid do Dashboard (2fr 1fr) */
    .main-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    /* ----------------------------------
       ELEMENTOS INTERNOS
       ---------------------------------- */
    .actions-list { display: flex; flex-direction: column; gap: 12px; }
    .action-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem;
      border-radius: 1rem;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-item:hover {
      background: var(--primary-light);
      border-color: var(--primary);
      transform: translateX(4px);
    }
    .action-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--bg-gradient);
      display: flex; align-items: center; justify-content: center;
      color: var(--primary);
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .action-info h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 2px; }
    .action-info p { font-size: 0.75rem; color: var(--text-muted); }

    .notification-list { display: flex; flex-direction: column; gap: 15px; }
    .notification-item {
      display: flex; gap: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }
    .notification-item:last-child { border-bottom: none; padding-bottom: 0; }
    .notif-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--primary-light);
      display: flex; align-items: center; justify-content: center;
      color: var(--primary); font-size: 0.9rem; flex-shrink: 0;
    }
    .notif-content p { font-size: 0.85rem; margin-bottom: 4px; line-height: 1.4; }
    .notif-time { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; }

    /* Tabelas */
    .table-container { overflow-x: auto; width: 100%; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th { text-align: left; padding: 1rem; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 1.2rem 1rem; font-size: 0.85rem; border-bottom: 1px solid var(--border); }

    /* Botões */
    .btn {
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
    .btn-outline:hover { background: var(--border); }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.75rem; }

    /* Formulários */
    .form-group { margin-bottom: 1.2rem; width: 100%; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: var(--text-secondary); }
    .form-control {
      width: 100%; padding: 0.8rem 1rem;
      border-radius: 1rem; border: 1px solid var(--border);
      background: var(--bg-gradient); color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }

    /* Outras Telas */
    .editor-grid { display: grid; grid-template-columns: 320px 1fr; gap: 1.5rem; }
    .plan-card { text-align: center; border: 2px solid transparent; position: relative; display: flex; flex-direction: column; justify-content: space-between;}
    .plan-card.featured { border-color: var(--primary); background: linear-gradient(180deg, var(--card-bg) 0%, var(--primary-light) 200%); }
    .plan-badge {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      background: var(--primary); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; white-space: nowrap;
    }
    .product-img { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; background: var(--border); }

    /* ----------------------------------
       RESPONSIVIDADE AJUSTADA
       ---------------------------------- */
    @media (max-width: 1024px) {
      .main-grid { grid-template-columns: 1fr; } /* Painéis empilhados no tablet */
      .editor-grid { grid-template-columns: 1fr; }
    }
    
    @media (max-width: 900px) {
      /* Comportamento do Sidebar no Mobile */
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      
      /* Main content ocupa 100% da tela */
      .main-content { margin-left: 0; width: 100vw; padding: 1.5rem; }
      
      .menu-mobile { display: block; }
      
      .top-bar { flex-direction: row; justify-content: space-between; }
    }

    @media (max-width: 480px) {
      /* Ajustes extras para celular pequeno */
      .stats-grid { grid-template-columns: 1fr; }
      .page-title h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><i class="fas fa-bolt" style="color: var(--primary);"></i> TV<span>Loja</span></div>
      <div class="user-info">
        <div class="avatar-lg">EO</div>
        <div class="user-text">
          <div class="name">Eduardo Oliveira</div>
          <div class="email">eduardo@loja.com</div>
        </div>
      </div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-label">Principal</div>
      <div class="nav-item active" data-view="dashboard"><i class="fas fa-th-large"></i> Dashboard</div>
      <div class="nav-item" data-view="editor"><i class="fas fa-magic"></i> Editar Site</div>
      <div class="nav-item" data-view="produtos"><i class="fas fa-shopping-bag"></i> Produtos</div>
      
      <div class="nav-label">Configurações</div>
      <div class="nav-item" data-view="dominio"><i class="fas fa-globe"></i> Domínio</div>
      <div class="nav-item" data-view="faturas"><i class="fas fa-file-invoice-dollar"></i> Faturas</div>
      <div class="nav-item" data-view="upgrade"><i class="fas fa-rocket"></i> Upgrade</div>
      <div class="nav-item" data-view="perfil"><i class="fas fa-user-cog"></i> Perfil</div>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-wrapper">
      <header class="top-bar">
        <div class="page-title">
          <button class="menu-mobile" id="menuToggle"><i class="fas fa-bars"></i></button>
          <div>
            <h1 id="pageTitle">Dashboard</h1>
            <p id="pageSubtitle">Bem-vindo de volta, Eduardo! Aqui está o resumo do seu site.</p>
          </div>
        </div>
        
        <div class="theme-toggle" id="themeToggle">
          <i class="fas fa-sun" id="iconSun"></i> / <i class="fas fa-moon" id="iconMoon"></i> 
          <span style="margin-left: 5px;">Modo</span>
        </div>
      </header>

      <div id="dynamicContent">
        </div>
    </div>
  </main>
</div>

<script>
  // ----------------------------------
  // GESTÃO DE TEMA E MENU MOBILE
  // ----------------------------------
  const body = document.body;
  const themeToggle = document.getElementById('themeToggle');
  
  // Verifica preferência salva
  if (localStorage.getItem('theme') === 'dark') {
    body.classList.add('dark');
  }

  themeToggle.addEventListener('click', () => {
    body.classList.toggle('dark');
    const isDark = body.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    
    // Atualiza gráfico se estiver na tela
    if (document.getElementById('visitsChart')) initChart();
  });

  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');

  function toggleMobileMenu() {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
  }
  menuToggle.addEventListener('click', toggleMobileMenu);
  overlay.addEventListener('click', toggleMobileMenu);

  // ----------------------------------
  // RENDERIZAÇÃO DE VIEWS (SPA SIMULADA)
  // ----------------------------------
  const container = document.getElementById('dynamicContent');
  const pageTitle = document.getElementById('pageTitle');
  const pageSubtitle = document.getElementById('pageSubtitle');
  let myChart = null;

  function renderView(viewId) {
    if (viewId === 'dashboard') {
      pageTitle.innerText = 'Painel Principal';
      pageSubtitle.innerText = 'Bem-vindo de volta, Eduardo! Aqui está o resumo do seu site.';
      container.innerHTML = `
        <div class="stats-grid">
          <div class="card-modern stat-card">
            <div class="stat-header">
              <div class="stat-icon" style="background-color: #dcfce7; color: #10b981;"><i class="fas fa-check-circle"></i></div>
              <span class="status-pill status-active">Ativo</span>
            </div>
            <span class="stat-label">Status da Conta</span>
            <span class="stat-value">Regular</span>
            <span class="stat-trend" style="color: var(--success);"><i class="fas fa-arrow-up"></i> Sem pendências</span>
          </div>

          <div class="card-modern stat-card">
            <div class="stat-header">
              <div class="stat-icon" style="background-color: #e0e7ff; color: #6366f1;"><i class="fas fa-rocket"></i></div>
            </div>
            <span class="stat-label">Plano Atual</span>
            <span class="stat-value">Pro</span>
            <span class="stat-trend" style="color: var(--text-muted);">Renovação em 10/06/2026</span>
          </div>

          <div class="card-modern stat-card">
            <div class="stat-header">
              <div class="stat-icon" style="background-color: #fef3c7; color: #f59e0b;"><i class="fas fa-globe"></i></div>
            </div>
            <span class="stat-label">Site Ativo</span>
            <span class="stat-value" style="font-size: 1.2rem; margin-top: 8px;">loja.tvloja.com.br</span>
            <span class="stat-trend"><a href="#" style="color: var(--primary); text-decoration: none;">Ver site <i class="fas fa-external-link-alt"></i></a></span>
          </div>

          <div class="card-modern stat-card">
            <div class="stat-header">
              <div class="stat-icon" style="background-color: #fee2e2; color: #ef4444;"><i class="fas fa-credit-card"></i></div>
            </div>
            <span class="stat-label">Próxima Cobrança</span>
            <span class="stat-value">R$ 49,90</span>
            <span class="stat-trend" style="color: var(--text-muted);">Vencimento: 10/06</span>
          </div>
        </div>

        <div class="main-grid">
          <div class="card-modern" style="min-width: 0;">
            <div class="card-title">
              <span>📊 Resumo de Acessos</span>
              <select class="btn-outline btn-sm" style="border-radius: 8px; cursor: pointer;">
                <option>Últimos 7 dias</option>
                <option>Últimos 30 dias</option>
              </select>
            </div>
            <div style="height: 300px; position: relative; width: 100%;">
              <canvas id="visitsChart"></canvas>
            </div>
          </div>

          <div class="card-modern">
            <div class="card-title">⚡ Ações Rápidas</div>
            <div class="actions-list">
              <div class="action-item" onclick="simulateNav('editor')">
                <div class="action-icon"><i class="fas fa-magic"></i></div>
                <div class="action-info">
                  <h4>Editar meu site</h4>
                  <p>Alterar cores, textos e fotos</p>
                </div>
              </div>
              <div class="action-item" onclick="simulateNav('dominio')">
                <div class="action-icon"><i class="fas fa-link"></i></div>
                <div class="action-info">
                  <h4>Configurar domínio</h4>
                  <p>Conectar ou comprar domínio</p>
                </div>
              </div>
              <div class="action-item" onclick="simulateNav('faturas')">
                <div class="action-icon"><i class="fas fa-receipt"></i></div>
                <div class="action-info">
                  <h4>Ver faturas</h4>
                  <p>Histórico e pagamentos</p>
                </div>
              </div>
              <div class="action-item" onclick="simulateNav('upgrade')">
                <div class="action-icon" style="color: var(--success);"><i class="fas fa-arrow-circle-up"></i></div>
                <div class="action-info">
                  <h4>Upgrade de plano</h4>
                  <p>Liberar recursos premium</p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="card-modern">
          <div class="card-title">🔔 Notificações recentes</div>
          <div class="notification-list">
            <div class="notification-item">
              <div class="notif-icon"><i class="fas fa-info-circle"></i></div>
              <div class="notif-content">
                <p>Seu domínio <strong>lojaexemplo.com.br</strong> foi conectado com sucesso!</p>
                <span class="notif-time">Há 2 horas</span>
              </div>
            </div>
            <div class="notification-item">
              <div class="notif-icon" style="color: var(--success); background: #dcfce7;"><i class="fas fa-check-circle"></i></div>
              <div class="notif-content">
                <p>Pagamento da fatura #4492 recebido via PIX.</p>
                <span class="notif-time">Ontem às 14:30</span>
              </div>

  // Lógica do Gráfico Chart.js
  function initChart() {
    const canvas = document.getElementById('visitsChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    
    // Cores dinâmicas para modo dark/light
    const isDark = body.classList.contains('dark');
    const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
    const textColor = isDark ? '#94a3b8' : '#64748b';

    if (myChart) myChart.destroy();
    
    myChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'],
        datasets: [{
          label: 'Visitas',
          data: [65, 78, 110, 85, 145, 190, 165],
          borderColor: '#f97316',
          backgroundColor: 'rgba(249, 115, 22, 0.1)',
          fill: true,
          tension: 0.4,
          borderWidth: 3,
          pointRadius: 4,
          pointBackgroundColor: '#f97316'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: gridColor },
            ticks: { color: textColor }
          },
          x: {
            grid: { display: false },
            ticks: { color: textColor }
          }
        }
      }
    });
  }

  // Navegação Global
  function simulateNav(view) {
    // Remove classe ativa de todos
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    
    // Procura o item correspondente e adiciona a classe ativa
    const navItem = document.querySelector(`.nav-item[data-view="${view}"]`);
    if (navItem) navItem.classList.add('active');

    // Fecha o menu mobile se estiver aberto
    if (window.innerWidth <= 900) {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    }

    renderView(view);
  }

  // Configura cliques nos itens do sidebar
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const view = item.getAttribute('data-view');
      simulateNav(view);
    });
  });

  // Inicializa o app na tela de dashboard
  renderView('dashboard');
